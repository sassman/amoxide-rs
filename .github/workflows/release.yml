name: Release

on:
  push:
    tags:
      # release-plz creates per-crate tags: amoxide-v0.1.0, amoxide-tui-v0.1.0
      - "amoxide-v[0-9]+.[0-9]+.[0-9]+"
      - "amoxide-v[0-9]+.[0-9]+.[0-9]+-*"
      - "amoxide-tui-v[0-9]+.[0-9]+.[0-9]+"
      - "amoxide-tui-v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    outputs:
      crate: ${{ steps.publish.outputs.crate }}
      version: ${{ steps.publish.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crate
        id: publish
        uses: ./.github/actions/publish-crate
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: "${{ needs.publish.outputs.crate }} v${{ needs.publish.outputs.version }}"
          generateReleaseNotes: true
          prerelease: ${{ contains(needs.publish.outputs.version, '-') }}
