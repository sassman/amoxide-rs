name: Release

on:
  push:
    tags:
      # release-plz creates per-crate tags: amoxide-v0.1.0, amoxide-tui-v0.1.0
      - "amoxide-v[0-9]+.[0-9]+.[0-9]+"
      - "amoxide-v[0-9]+.[0-9]+.[0-9]+-*"
      - "amoxide-tui-v[0-9]+.[0-9]+.[0-9]+"
      - "amoxide-tui-v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Extract crate from tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CRATE="${TAG%-v*}"
          echo "crate=$CRATE" >> "$GITHUB_OUTPUT"
      - name: Publish ${{ steps.tag.outputs.crate }}
        run: cargo publish -p ${{ steps.tag.outputs.crate }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract crate and version from tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Tag format: amoxide-v0.1.0 or amoxide-tui-v0.1.0
          VERSION="${TAG##*-v}"
          CRATE="${TAG%-v*}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "crate=$CRATE" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          name: "${{ steps.tag.outputs.crate }} v${{ steps.tag.outputs.version }}"
          generateReleaseNotes: true
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
