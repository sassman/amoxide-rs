name: Publish Crate
description: >
  Extracts the crate name from the current git tag and publishes it to
  crates.io with retry/backoff to handle dependency propagation delays.

inputs:
  registry-token:
    description: crates.io API token
    required: true

outputs:
  crate:
    description: The crate name extracted from the tag
    value: ${{ steps.tag.outputs.crate }}
  version:
    description: The version extracted from the tag
    value: ${{ steps.tag.outputs.version }}

runs:
  using: composite
  steps:
    - name: Extract crate and version from tag
      id: tag
      shell: bash
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        # Tag format: amoxide-v0.1.0 or amoxide-tui-v0.1.0
        VERSION="${TAG##*-v}"
        CRATE="${TAG%-v*}"
        if [[ -z "$CRATE" ]]; then
          echo "::error::Could not extract crate name from tag '$TAG'"
          exit 1
        fi
        echo "crate=$CRATE" >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Publish ${{ steps.tag.outputs.crate }}
      shell: bash
      env:
        CARGO_REGISTRY_TOKEN: ${{ inputs.registry-token }}
      run: |
        CRATE="${{ steps.tag.outputs.crate }}"
        BACKOFF=(30 60 120)
        ATTEMPTS=${#BACKOFF[@]}

        for (( i=0; i<=ATTEMPTS; i++ )); do
          echo "::group::Attempt $((i + 1)) – cargo publish -p $CRATE"
          if cargo publish -p "$CRATE"; then
            echo "::endgroup::"
            echo "✓ Published $CRATE successfully"
            exit 0
          fi
          echo "::endgroup::"

          if (( i == ATTEMPTS )); then
            echo "::error::Failed to publish $CRATE after $((ATTEMPTS + 1)) attempts"
            exit 1
          fi

          WAIT=${BACKOFF[$i]}
          echo "⏳ Publish failed – retrying in ${WAIT}s (attempt $((i + 2))/$((ATTEMPTS + 1)))"
          sleep "$WAIT"
        done
