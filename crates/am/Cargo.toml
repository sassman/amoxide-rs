[package]
name = "amoxide"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "am"
path = "src/bin/am.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["help", "derive", "usage", "env"] }
env_logger = "0.11"
log = "0.4"
dirs-lite = { version = "1", features = ["favor-xdg-style"] }
toml = "1"
regex = "1"
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
indoc = "2.0"
insta = "1"

[build-dependencies]
clap_complete = "4.5"
clap = { version = "4.5", features = ["help", "derive", "usage", "env"] }
regex = "1"
