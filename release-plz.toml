[workspace]
changelog_update = true
git_tag_enable = true
publish = false
# Unified tag for all crates: v0.2.0 instead of amoxide-v0.2.0 / amoxide-tui-v0.2.0
# This lets cargo-dist produce a single GitHub Release with artifacts for all binaries
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

[[package]]
name = "amoxide-tui"
# Include amoxide library commits in the TUI changelog.
# Needed because the unified git tag (v{{ version }}) prevents release-plz
# from attributing per-crate commits, so amoxide-tui would otherwise get an
# empty changelog entry on every release.
changelog_include = ["amoxide"]

[changelog]
header = """
# Changelog
All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
## [{{ version }}]{%- if release_link -%}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}
"""
trim = true
protect_breaking_commits = false
sort_commits = "newest"

commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore", group = "Miscellaneous Tasks" },
    { body = ".*security", group = "Security" },
]
