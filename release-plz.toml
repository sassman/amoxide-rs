[workspace]
changelog_update = true
git_tag_enable = false
publish = false
# Unified tag for all crates: v0.2.0 instead of amoxide-v0.2.0 / amoxide-tui-v0.2.0
# This lets cargo-dist produce a single GitHub Release with artifacts for all binaries
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

[[package]]
name = "amoxide-tui"
# Include amoxide library commits in the TUI changelog.
# Needed because the unified git tag (v{{ version }}) prevents release-plz
# from attributing per-crate commits, so amoxide-tui would otherwise get an
# empty changelog entry on every release.
changelog_include = ["amoxide"]

# The `[changelog]` and `commit_parsers` blocks below mirror `cliff.toml`,
# which is the canonical source of truth (consumed by the local
# `release-notes` alias). When you change anything here, mirror the change
# in `cliff.toml` too. release-plz's `changelog_config` option that would
# let us point at the external file is deprecated, so we duplicate instead.
[changelog]
header = """
# Changelog
All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
## [{{ version }}]{%- if release_link -%}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% set breaking = commits | filter(attribute="breaking", value=true) -%}
{% if breaking | length > 0 %}
### ⚠ Breaking changes
{% for commit in breaking %}
- **{{ commit.message | upper_first }}**{%- if commit.remote.pr_number %} by @{{ commit.remote.username }} in [#{{ commit.remote.pr_number }}](https://github.com/sassman/amoxide-rs/pull/{{ commit.remote.pr_number }}){%- endif %}
{%- if commit.body %}

{{ commit.body | trim | indent(prefix="  ", first=true) }}
{%- endif %}
{% endfor %}
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.breaking %} [breaking]{% endif %}{%- if commit.remote.pr_number %} by @{{ commit.remote.username }} in [#{{ commit.remote.pr_number }}](https://github.com/sassman/amoxide-rs/pull/{{ commit.remote.pr_number }}){%- endif %}
{%- if commit.body %}

{{ commit.body | trim | indent(prefix="  ", first=true) }}
{%- endif %}
{% endfor %}
{% endfor %}
"""
trim = true
protect_breaking_commits = false
sort_commits = "newest"

commit_parsers = [
    # Drop release-plz/amoxide's own release commits and dependency bumps
    { message = "^chore: release v[0-9]", skip = true },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    # Group everything else
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^test", group = "Testing" },
    { message = "^chore", group = "Miscellaneous Tasks" },
    { body = ".*security", group = "Security" },
]
